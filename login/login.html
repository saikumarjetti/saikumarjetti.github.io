<!doctype html>
<html lang="en">
  <head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" integrity="sha384-JcKb8q3iqJ61gNV9KGb8thSsNjpSL0n8PARn9HuZOnIxN0hoP+VmmDGMN5t9UJ0Z" crossorigin="anonymous">

    <title>login</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
   
    <div class="main">
      <form class="mt-5">
          <!-- Bro this is a svg icon -->
          <div class="text-center">
          <svg width="6em" height="6em" viewBox="0 0 16 16" class="bi bi-person-circle " fill="currentColor" xmlns="http://www.w3.org/2000/svg">
              <path d="M13.468 12.37C12.758 11.226 11.195 10 8 10s-4.757 1.225-5.468 2.37A6.987 6.987 0 0 0 8 15a6.987 6.987 0 0 0 5.468-2.63z"/>
              <path fill-rule="evenodd" d="M8 9a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
              <path fill-rule="evenodd" d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8z"/>
            </svg>
          </div>

          <h1 class="text-center mt-3">Sign in Bro 👦</h1>
          
          <div class="input-group flex-nowrap mt-4">
            <div class="input-group-prepend">
              <span class="input-group-text" id="addon-wrapping">Email</span>
            </div>
            <input type="email" class="form-control" placeholder="Email" aria-label="Email" aria-describedby="addon-wrapping" >
          </div>
          <label for="emalAddress" class="mt-4"></label>

         
          
          <div class="input-group flex-nowrap">
            <div class="input-group-prepend">
              <span class="input-group-text" id="addon-wrapping">Password</span>
            </div>
            <input type="password" class="form-control" placeholder="password 🧐" aria-label="password 🧐" aria-describedby="addon-wrapping" >
          </div>
          <label for="password" class="mt-4"></label>

          <div class= "text-center">
              <button class="mt-3 btn btn-lg btn-primary">Sign in</button>
          </div>
          <div class="text-center">
              <h4 class="mt-3 ">Dont have an account?<a href="./index.html">Sign Up</a></h3>
            </div>
      </form>
  </div>






    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js" integrity="sha384-9/reFTGAW83EW2RDu2S0VKaIzap3H66lZH81PoYlFhbGU+6BZp6G7niu735Sk7lN" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js" integrity="sha384-B4gt1jrGC7Jh4AgTPSdUtOBvfO8shuf57BaghqFfPlYxofvL8/KUEfYiJOMMV+rV" crossorigin="anonymous"></script>
  </body>
</html>
